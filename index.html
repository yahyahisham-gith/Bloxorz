<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloxorz - Station Portal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="path/to/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("game-container").appendChild(player);
            
            player.load("bloxorz.swf").then(() => {
                // Auto-focus the game so arrow keys work instantly
                player.focus();
            });

            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>
</body>
</html>
