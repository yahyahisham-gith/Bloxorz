<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloxorz</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        /* Floating Fullscreen Button */
        #fs-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.3s, background 0.3s;
            opacity: 0.5;
        }
        #fs-btn:hover { opacity: 1; background: rgba(255, 255, 255, 0.4); }
        
        /* Hide button when in actual fullscreen to keep it clean */
        #game-container:fullscreen #fs-btn { display: none; }
        #game-container:-webkit-full-screen #fs-btn { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="fs-btn">⛶ Fullscreen</button>
    </div>

    <script src="path/to/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        const container = document.getElementById("game-container");
        const fsBtn = document.getElementById("fs-btn");
        let player;

        // --- 1. FULLSCREEN LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- 2. KEYBOARD HANDLERS ---
        window.addEventListener("keydown", (e) => {
            // Check for F11
            if (e.key === "F11") {
                e.preventDefault(); // Stop browser default F11
                toggleFullScreen();
            }
        });

        fsBtn.addEventListener("click", toggleFullScreen);

        // --- 3. RUFFLE INITIALIZATION ---
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            container.appendChild(player);
            
            player.load("bloxorz.swf").then(() => {
                player.focus();
            });

            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>
</body>
</html>
